{% extends 'base.html' %}
{% block title %}Экспорт в Excel{% endblock %}
{% block sidebar %}{% include 'admin/_sidebar.html' %}{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-file-earmark-excel me-2"></i>Экспорт выполненных работ</h4>

<div class="card p-4" style="max-width:500px">
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Жилой комплекс <span class="text-danger">*</span></label>
      <select name="building_id" class="form-select" required>
        <option value="">— выбрать —</option>
        {% for b in buildings %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Дата с <span class="text-danger">*</span></label>
      <input type="date" name="date_from" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Дата по <span class="text-danger">*</span></label>
      <input type="date" name="date_to" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">
      <i class="bi bi-download me-1"></i>Скачать Excel
    </button>
  </form>
  <div class="alert alert-info mt-3 small mb-0">
    <i class="bi bi-info-circle me-1"></i>
    Выгружаются только завершённые этапы с датой завершения в указанном периоде.
  </div>
</div>
{% endblock %}
