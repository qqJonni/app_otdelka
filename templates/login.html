<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Штаб отделки</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); min-height: 100vh; display:flex; align-items:center; }
    .card { border: none; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .brand-icon { font-size: 2.5rem; color: #0d6efd; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
      <div class="card rounded-4 p-4">
        <div class="text-center mb-4">
          <i class="bi bi-hammer brand-icon"></i>
          <h4 class="mt-2 fw-bold">Штаб отделки</h4>
          <p class="text-muted small">Система управления отделочными работами</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Логин</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Пароль</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Войти
          </button>
        </form>

        <hr class="my-3">
        <div class="text-center small">
          Нет аккаунта?
          <a href="{{ url_for('register') }}" class="fw-semibold">Зарегистрироваться</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
