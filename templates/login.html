<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Штаб отделки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/crm.css') }}" rel="stylesheet">
</head>
<body class="auth-page">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
      <div class="auth-card">
        <div class="text-center mb-4">
          <div class="auth-logo-icon">
            <i class="bi bi-building"></i>
          </div>
          <h4 class="fw-bold mb-1" style="color:var(--text-main)">Штаб отделки</h4>
          <p class="small" style="color:var(--text-secondary)">Система управления отделочными работами</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label">Логин</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Пароль</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold" style="height:44px">
            <i class="bi bi-box-arrow-in-right me-1"></i>Войти
          </button>
        </form>

        <hr class="my-4" style="border-color:var(--border)">
        <div class="text-center small" style="color:var(--text-secondary)">
          Нет аккаунта?
          <a href="{{ url_for('register') }}" class="fw-semibold">Зарегистрироваться</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
